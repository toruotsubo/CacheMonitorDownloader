<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <h2>Cache Downloader</h2>

    <div class="control-group toggle-group">
      <label class="switch">
        <input type="checkbox" id="enableToggle">
        <span class="slider round"></span>
      </label>
      <span id="statusText">Off</span>
    </div>

    <div class="control-group">
      <label for="extensions">Target Extensions (comma separated):</label>
      <input type="text" id="extensions" placeholder="e.g. png, jpg, pdf">
    </div>

    <div class="control-group">
      <label for="folder">Save Folder (under Downloads):</label>
      <input type="text" id="folder" placeholder="e.g. cacheMonitorDownloader">
    </div>

    <div class="control-group toggle-group" style="margin-top: 5px; margin-bottom: 5px;">
      <label class="switch">
        <input type="checkbox" id="addTimestamp">
        <span class="slider round"></span>
      </label>
      <label for="addTimestamp" style="cursor: pointer;">Add timestamp (yyyymmddhhmmss)</label>
    </div>

    <button id="saveBtn">Save Settings</button>
    <div id="msg" class="message"></div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
